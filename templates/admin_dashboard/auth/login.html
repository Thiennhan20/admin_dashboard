<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #eef3f8;
            --panel: #ffffff;
            --ink: #111827;
            --muted: #64748b;
            --line: #d6dee9;
            --teal: #0f766e;
            --teal-dim: rgba(15, 118, 110, 0.08);
            --amber: #d97706;
            --red: #dc2626;
            --radius: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100vh;
            min-height: 100dvh;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(120deg, rgba(15, 118, 110, .10), transparent 36%),
                linear-gradient(240deg, rgba(37, 99, 235, .08), transparent 34%),
                var(--bg);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--ink);
        }

        .auth-wrapper {
            width: min(100%, 420px);
            padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        }

        .auth-card {
            background: var(--panel);
            border: 1px solid rgba(148, 163, 184, .35);
            border-radius: 20px;
            padding: clamp(28px, 5vw, 40px);
            box-shadow: 0 22px 70px rgba(15, 23, 42, .12);
        }

        .alert {
            border: 1px solid transparent;
            border-radius: 12px;
            font-size: 14px;
            padding: 12px 14px;
        }

        .alert-danger {
            border-color: rgba(220, 38, 38, .22);
            background: rgba(220, 38, 38, .06);
            color: var(--red);
        }

        .alert-success {
            border-color: rgba(15, 118, 110, .22);
            background: rgba(15, 118, 110, .06);
            color: var(--teal);
        }

        .alert-info,
        .alert-warning {
            border-color: rgba(217, 119, 6, .22);
            background: rgba(217, 119, 6, .06);
            color: var(--amber);
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: var(--ink);
            font-size: 14px;
            font-weight: 750;
        }

        .field label i {
            color: var(--teal);
            font-size: 13px;
        }

        .input-shell {
            position: relative;
        }

        .form-control {
            width: 100%;
            min-height: 50px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #f8fafc;
            color: var(--ink);
            font-size: 15px;
            padding: 13px 14px;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }

        .form-control.password-input {
            padding-right: 48px;
        }

        .form-control::placeholder {
            color: #94a3b8;
            opacity: 1;
        }

        .form-control:focus {
            outline: none;
            background: #fff;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-dim);
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 8px;
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            transform: translateY(-50%);
            border: 0;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: background .15s, color .15s;
        }

        .password-toggle:hover {
            background: #e9eef5;
            color: var(--teal);
        }

        .btn-auth {
            width: 100%;
            min-height: 50px;
            border: 0;
            border-radius: 12px;
            background: #0b1220;
            color: #fff;
            font-weight: 800;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            cursor: pointer;
            transition: background .15s;
        }

        .btn-auth:hover {
            background: #111c31;
        }

        .auth-links {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 22px;
        }

        .auth-link {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            border: 1px solid var(--line);
            border-radius: 12px;
            color: var(--ink);
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            background: #fff;
            transition: border-color .15s, color .15s, background .15s;
        }

        .auth-link:hover {
            border-color: var(--teal);
            color: var(--teal);
            background: #f0fdfa;
        }

        @media (max-width: 480px) {
            .auth-wrapper { padding: 16px; }
            .auth-card { padding: 24px 20px; }
            .auth-links { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-3" role="alert">
                        <i class="fas fa-circle-info me-2"></i>{{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" id="loginForm" novalidate>
                {% csrf_token %}

                <div class="field">
                    <label for="username"><i class="fas fa-user"></i>Tên đăng nhập</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Nhập username" required autocomplete="username" autocapitalize="none" spellcheck="false">
                </div>

                <div class="field">
                    <label for="password"><i class="fas fa-key"></i>Mật khẩu</label>
                    <div class="input-shell">
                        <input type="password" class="form-control password-input" id="password" name="password" placeholder="Nhập password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" data-toggle-password="password" aria-label="Hiện mật khẩu">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-auth" id="loginBtn">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    <span>Đăng nhập</span>
                </button>
            </form>

            <div class="auth-links">
                <a class="auth-link" href="{% url 'admin_dashboard:register' %}">
                    <i class="fas fa-user-plus"></i>Tạo tài khoản
                </a>
                <a class="auth-link" href="{% url 'admin:index' %}">
                    <i class="fas fa-screwdriver-wrench"></i>Django Admin
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('[data-toggle-password]').forEach(button => {
            button.addEventListener('click', () => {
                const input = document.getElementById(button.dataset.togglePassword);
                const icon = button.querySelector('i');
                const show = input.type === 'password';
                input.type = show ? 'text' : 'password';
                icon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
                button.setAttribute('aria-label', show ? 'Ẩn mật khẩu' : 'Hiện mật khẩu');
            });
        });

        document.getElementById('loginForm').addEventListener('submit', () => {
            const button = document.getElementById('loginBtn');
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Đang xử lý...</span>';
        });
    </script>
</body>
</html>
