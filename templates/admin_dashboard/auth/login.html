<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --secondary-color: #64748b;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-color: #1e293b;
            --light-color: #f8fafc;
            --border-color: #e2e8f0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow: hidden;
        }
        
        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 350px;
            max-height: 100vh;
            position: relative;
        }
        
        .login-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1.25rem;
            text-align: center;
        }
        
        .login-header h2 {
            margin: 0;
            font-weight: 600;
            font-size: 1.25rem;
        }
        
        .login-header p {
            margin: 0.25rem 0 0 0;
            opacity: 0.9;
            font-size: 0.8rem;
        }
        
        .login-body {
            padding: 1.25rem;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 0.75rem;
        }
        
        .form-label {
            font-weight: 500;
            color: var(--dark-color);
            margin-bottom: 0.375rem;
            display: flex;
            align-items: center;
            font-size: 0.85rem;
        }
        
        .form-label i {
            margin-right: 0.5rem;
            color: var(--primary-color);
            width: 14px;
        }
        
        .input-group {
            position: relative;
        }
        
        .form-control {
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            background: var(--light-color);
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: white;
        }
        
        .btn-login {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.625rem;
            border-radius: 6px;
            width: 100%;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login.loading {
            pointer-events: none;
        }
        
        .btn-login.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            margin: -7px 0 0 -7px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .alert {
            border-radius: 6px;
            border: none;
            margin-bottom: 0.75rem;
            font-size: 0.8rem;
            padding: 0.5rem 0.75rem;
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border-left: 3px solid var(--success-color);
        }
        
        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            border-left: 3px solid var(--danger-color);
        }
        
        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning-color);
            border-left: 3px solid var(--warning-color);
        }
        
        .password-toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--secondary-color);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.3s ease;
            font-size: 0.8rem;
        }
        
        .password-toggle:hover {
            color: var(--primary-color);
        }
        
        .divider {
            text-align: center;
            margin: 0.75rem 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
        }
        
        .divider span {
            background: white;
            padding: 0 0.5rem;
            color: var(--secondary-color);
            font-size: 0.75rem;
        }
        
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .quick-links a {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            color: var(--secondary-color);
            text-decoration: none;
        }
        
        .quick-links a:hover {
            background: var(--light-color);
            color: var(--primary-color);
        }
        
        @media (max-width: 480px) {
            body {
                padding: 0;
                height: 100vh;
                overflow: hidden;
            }
            
            .login-container {
                margin: 0;
                border-radius: 0;
                height: 100vh;
                max-height: 100vh;
                max-width: 100%;
            }
            
            .login-header {
                padding: 1rem;
            }
            
            .login-header h2 {
                font-size: 1.125rem;
            }
            
            .login-header p {
                font-size: 0.75rem;
            }
            
            .login-body {
                padding: 1rem;
                max-height: calc(100vh - 100px);
                overflow-y: auto;
            }
            
            .form-group {
                margin-bottom: 0.625rem;
            }
            
            .form-label {
                font-size: 0.8rem;
                margin-bottom: 0.25rem;
            }
            
            .form-control {
                padding: 0.5rem 0.625rem;
                font-size: 0.8rem;
            }
            
            .btn-login {
                padding: 0.5rem;
                font-size: 0.8rem;
            }
            
            .alert {
                font-size: 0.75rem;
                padding: 0.5rem;
                margin-bottom: 0.5rem;
            }
            
            .quick-links {
                flex-direction: row;
                gap: 0.375rem;
                margin-top: 0.375rem;
            }
            
            .quick-links a {
                font-size: 0.7rem;
                padding: 0.25rem 0.375rem;
            }
        }
        
        @media (max-height: 600px) {
            .login-header {
                padding: 0.75rem;
            }
            
            .login-header h2 {
                font-size: 1rem;
            }
            
            .login-header p {
                font-size: 0.7rem;
            }
            
            .login-body {
                padding: 0.75rem;
                max-height: calc(100vh - 80px);
            }
            
            .form-group {
                margin-bottom: 0.5rem;
            }
            
            .divider {
                margin: 0.5rem 0;
            }
            
            .quick-links {
                margin-top: 0.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2><i class="fas fa-shield-alt me-2"></i>Admin Login</h2>
            <p>Đăng nhập vào hệ thống quản trị</p>
        </div>
        
        <div class="login-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        <i class="fas fa-info-circle me-2"></i>
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
            
            <form method="POST" id="loginForm">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username" class="form-label">
                        <i class="fas fa-user"></i>Username
                    </label>
                    <input type="text" class="form-control" id="username" name="username" 
                           placeholder="Nhập username" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i>Password
                    </label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Nhập password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="passwordToggle"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-login" id="loginBtn">
                    <span id="loginText">
                        <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
                    </span>
                    <span id="loginLoading" style="display: none;">
                        <i class="fas fa-spinner fa-spin me-2"></i>Đang xử lý...
                    </span>
                </button>
            </form>
            
            <div class="divider">
                <span>hoặc</span>
            </div>
            
            <div class="quick-links">
                <a href="{% url 'admin_dashboard:register' %}">
                    <i class="fas fa-user-plus me-1"></i>Tạo tài khoản
                </a>
                <a href="{% url 'admin:index' %}">
                    <i class="fas fa-cog me-1"></i>Django Admin
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('passwordToggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
        
        // Form submission with loading state
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginLoading = document.getElementById('loginLoading');
            
            // Show loading state
            loginBtn.classList.add('loading');
            loginText.style.display = 'none';
            loginLoading.style.display = 'inline';
            
            // Form will submit normally
        });
        
        // Auto-hide alerts after 5 seconds
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                alert.style.transition = 'opacity 0.5s ease';
                alert.style.opacity = '0';
                setTimeout(function() {
                    alert.remove();
                }, 500);
            });
        }, 5000);
        
        // Focus on username field when page loads
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('username').focus();
        });
        
        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').submit();
            }
        });
    </script>
</body>
</html>
